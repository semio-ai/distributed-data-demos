# T14.19 regression fixture: high-rate symmetric TCP qos4 in Single
# mode at the workload that previously deadlocked custom-udp Single
# (1000 vpt x 100 Hz = 100K msg/s symmetric).
#
# Pre-T14.19: both runners wedged inside `write_all` on the qos4 TCP
# out-stream because neither could call `poll_receive` between writes
# to drain the peer's recv buffer; runner killed by `default_timeout_secs`.
#
# Post-T14.19: `SO_SNDTIMEO` on outbound TCP turns the wedge into a
# timed-out write -> peer dropped -> publish loop exits naturally ->
# EOT phase reached via the T14.18 control channel -> status=success.
# Delivery is expected to be near zero; we ONLY assert `success`.
#
# 8 s operate gives the spawn enough time to actually exercise the
# wedge condition; 30 s default_timeout_secs is generous but well
# below the prior deadlock (which never returned).

run = "custom-udp-t14-19"
runners = ["alice", "bob"]
default_timeout_secs = 30

[[variant]]
name = "custom-udp-t14-19-stress"
supported_modes = ["single"]
binary = "target/release/variant-custom-udp.exe"

  [variant.common]
  tick_rate_hz = 100
  stabilize_secs = 1
  operate_secs = 8
  silent_secs = 1
  workload = "scalar-flood"
  values_per_tick = 1000
  qos = 4
  log_dir = "./logs"
  threading_modes = ["single"]

  [variant.specific]
  multicast_group = "239.0.0.1:19544"
  buffer_size = 65536
  tcp_base_port = 19840
