# T14.19 regression fixture: high-rate symmetric WebSocket qos4 in
# Single mode at the workload that previously deadlocked websocket
# Single (1000 vpt x 100 Hz = 100K msg/s symmetric).
#
# Pre-T14.19: both runners wedged inside tungstenite's blocking
# `write` on the qos4 stream because neither could call `poll_receive`
# between writes to drain the peer's recv buffer; runner killed by
# `default_timeout_secs`.
#
# Post-T14.19: `SO_SNDTIMEO = 5 s` on outbound TCP in Single mode
# turns the wedge into a typed `TimedOut` error -> peer dropped ->
# publish loop continues -> operate phase exits naturally -> EOT
# phase logs `eot_timeout` (websocket has no separate control
# channel; once the data peer is dropped the EOT cannot route) ->
# silent phase passes -> spawn exits with status=success.
#
# Delivery is expected to be near zero; we ONLY assert `success`.

run = "websocket-t14-19"
runners = ["alice", "bob"]
# Generous to allow operate (8s) + EOT (5s, set below) + silent (1s) +
# disconnect/teardown overhead. The fast EOT timeout is the lever that
# keeps total wall time short -- without it the default
# `max(3 * operate_secs, 30) = 30s` EOT wait would push total runtime
# past 40 s on its own.
default_timeout_secs = 45

[[variant]]
name = "websocket-t14-19-stress"
supported_modes = ["single"]
binary = "target/release/variant-websocket.exe"

  [variant.common]
  tick_rate_hz = 100
  stabilize_secs = 1
  operate_secs = 8
  silent_secs = 1
  workload = "scalar-flood"
  values_per_tick = 1000
  qos = 4
  log_dir = "./logs"
  threading_modes = ["single"]
  # Websocket has no T14.18-style control channel: once the data peer
  # is dropped, EOT cannot route and the EOT phase will wait the full
  # window for nothing. Cap it short so the spawn exits within the
  # runner's default_timeout_secs budget.

  [variant.specific]
  ws_base_port = 19970
