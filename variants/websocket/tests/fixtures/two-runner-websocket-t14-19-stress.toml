# T14.19 / T17.5 regression fixture: high-rate symmetric WebSocket
# qos4 in Single mode at the workload that previously deadlocked
# websocket Single (1000 vpt x 100 Hz = 100K msg/s symmetric).
#
# Pre-T14.19: both runners wedged inside tungstenite's blocking
# `write` on the qos4 stream because neither could call `poll_receive`
# between writes to drain the peer's recv buffer; runner killed by
# `default_timeout_secs`.
#
# T14.19 (superseded): `SO_SNDTIMEO = 5 s` plus drop-the-peer on the
# resulting `TimedOut` error. Unwedged the deadlock at the cost of
# near-zero delivery (peer dropped mid-operate). Accepted before
# E17 under the "log everything with bad latency" intent.
#
# T17.5 (current): `SO_SNDTIMEO = 100 ms` plus DRAIN-AND-RETRY on
# the resulting `TimedOut`. The drain step empties the recv side
# (logging every receive), which frees the peer's kernel send
# buffer so the peer's blocked write can drain; that in turn lets
# the peer's publish loop continue and eventually call its own
# `poll_receive`, draining our send buffer. The wedged send is
# resumed via `WebSocket::flush` (tungstenite keeps the partially-
# written frame buffered) and the loop blocks the publisher until
# the message lands -- per DESIGN.md § 6.5. Delivery now reaches
# 100% on this cell at the cost of throughput collapse (the
# explicitly-acceptable failure mode per § 6.5).
#
# Acceptance: both runners exit `status=success`.

run = "websocket-t14-19"
runners = ["alice", "bob"]
# Generous to allow operate (8s) + EOT (5s, set below) + silent (1s) +
# disconnect/teardown overhead. The fast EOT timeout is the lever that
# keeps total wall time short -- without it the default
# `max(3 * operate_secs, 30) = 30s` EOT wait would push total runtime
# past 40 s on its own.
default_timeout_secs = 45

[[variant]]
name = "websocket-t14-19-stress"
supported_modes = ["single"]
binary = "target/release/variant-websocket.exe"

  [variant.common]
  tick_rate_hz = 100
  stabilize_secs = 1
  operate_secs = 8
  silent_secs = 1
  workload = "scalar-flood"
  values_per_tick = 1000
  qos = 4
  log_dir = "./logs"
  threading_modes = ["single"]
  # Websocket has no T14.18-style control channel: once the data peer
  # is dropped, EOT cannot route and the EOT phase will wait the full
  # window for nothing. Cap it short so the spawn exits within the
  # runner's default_timeout_secs budget.

  [variant.specific]
  ws_base_port = 19970
