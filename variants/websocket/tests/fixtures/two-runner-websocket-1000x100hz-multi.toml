# T14.2 high-rate fixture: two-runner-on-localhost websocket spawn at
# 1000 values * 100 Hz = 100 K msg/s symmetric, QoS 4, MULTI threading
# mode only. This is the workload that exposed the T-impl.10 residual
# deadlock under the pre-T14.2 Single mode; under Multi mode the
# expected delivery is >= 99% on both sides.
#
# Phases are trimmed so the regression test runs in reasonable time.

run = "websocket-tImpl14_2-1000x100hz-multi"
runners = ["alice", "bob"]
default_timeout_secs = 240

[[variant]]
name = "websocket-1000x100hz-multi"
binary = "target/release/variant-websocket.exe"

  [variant.common]
  tick_rate_hz = 100
  stabilize_secs = 3
  operate_secs = 30
  silent_secs = 3
  workload = "scalar-flood"
  values_per_tick = 1000
  qos = 4
  threading_modes = ["multi"]
  log_dir = "./logs"

  [variant.specific]
  ws_base_port = 19960
