[package]
name = "variant-base"
version = "0.1.0"
edition = "2021"
build = "../build_info.rs"

[lib]
name = "variant_base"
path = "src/lib.rs"

[[bin]]
name = "variant-dummy"
path = "src/bin/variant_dummy.rs"

[dependencies]
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sysinfo = "0.33"
thiserror = "2"

[dev-dependencies]
tempfile = "3"
