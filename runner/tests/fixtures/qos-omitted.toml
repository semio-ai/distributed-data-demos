run = "qosall"
runners = ["local"]
default_timeout_secs = 30
inter_qos_grace_ms = 100

[[variant]]
name = "dummy"
binary = "../target/release/variant-dummy.exe"

  [variant.common]
  tick_rate_hz = 10
  stabilize_secs = 0
  operate_secs = 1
  silent_secs = 0
  workload = "scalar-flood"
  values_per_tick = 2
  log_dir = "./test-logs-qos-omitted"

  [variant.specific]
