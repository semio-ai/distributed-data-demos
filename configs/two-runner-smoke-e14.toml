# E14 end-to-end smoke. One workload (100 vpt x 100 Hz = 10K msg/s) per
# variant family at qos4, both threading modes where supported. ~12 spawns,
# ~3 min wall-time. Used to validate the E14 plumbing (threading_modes
# expansion + supported_modes capability gating) and exercise the T11.5
# receive-headline analysis on real cross-variant data.
#
# Run from the repo root:
#   target/release/runner --name alice --config configs/two-runner-smoke-e14.toml
#   target/release/runner --name bob   --config configs/two-runner-smoke-e14.toml

run = "smoke-e14"
runners = ["alice", "bob"]
default_timeout_secs = 60

# ─── Custom UDP ──────────────────────────────────────────────────────────────

[[variant]]
name = "custom-udp-100x100hz"
binary = "target/release/variant-custom-udp.exe"
  [variant.common]
  tick_rate_hz = 100
  values_per_tick = 100
  stabilize_secs = 2
  operate_secs = 10
  silent_secs = 2
  workload = "scalar-flood"
  qos = [4]
  threading_modes = ["single", "multi"]
  log_dir = "./logs"
  [variant.specific]
  multicast_group = "239.0.0.1:19601"
  buffer_size = 65536
  tcp_base_port = 19610
  control_base_port = 19720

