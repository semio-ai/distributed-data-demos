run = "zenoh-all"
runners = ["alice", "bob"]
default_timeout_secs = 60

[[variant]]
name = "zenoh-1000x100hz"
binary = "variants/zenoh/target/release/variant-zenoh.exe"

  [variant.common]
  tick_rate_hz = 100
  stabilize_secs = 2
  operate_secs = 10
  silent_secs = 2
  workload = "scalar-flood"
  values_per_tick = 1000
  qos = 2
  log_dir = "./logs"

  [variant.specific]
  zenoh_mode = "peer"

