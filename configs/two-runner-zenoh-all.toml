run = "zenoh-all"
runners = ["alice", "bob"]
default_timeout_secs = 120

# ─── Zenoh ───────────────────────────────────────────────────────────────────

[[variant_template]]
name = "zenoh-base"
binary = "target/release/variant-zenoh.exe"
  [variant_template.common]
  stabilize_secs = 3
  operate_secs = 30
  silent_secs = 3
  workload = "scalar-flood"
  log_dir = "./logs"
  threading_modes = ["single", "multi"]
  [variant_template.specific]
  zenoh_mode = "peer"

# --- 1000 vpt x 100 hz ---
[[variant]]
template = "zenoh-base"
supported_modes = ["multi"]
name = "zenoh-1000x100hz-scalar"
  [variant.common]
  tick_rate_hz = 100
  values_per_tick = 1000

[[variant]]
template = "zenoh-base"
supported_modes = ["multi"]
name = "zenoh-1000x100hz-block"
  [variant.common]
  tick_rate_hz = 100
  values_per_tick = 1000
  workload = "block-flood"
  blob_size = 100

[[variant]]
template = "zenoh-base"
supported_modes = ["multi"]
name = "zenoh-1000x100hz-mixed"
  [variant.common]
  tick_rate_hz = 100
  values_per_tick = 1000
  workload = "mixed-types"
  mixed_scalars_min = 5
  mixed_scalars_max = 20
  mixed_arrays_min = 200
  mixed_arrays_max = 600
  mixed_dict_split_max = 4
  workload_seed = 12345

