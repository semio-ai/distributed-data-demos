run = "hybrid-all"
runners = ["alice", "bob"]
default_timeout_secs = 60

[[variant]]
name = "hybrid-1000x100hz"
binary = "variants/hybrid/target/release/variant-hybrid.exe"

  [variant.common]
  tick_rate_hz = 100
  stabilize_secs = 2
  operate_secs = 10
  silent_secs = 2
  workload = "scalar-flood"
  values_per_tick = 1000
  qos = 2
  log_dir = "./logs"

  [variant.specific]
  multicast_group = "239.0.0.1:19502"
  tcp_base_port = 19900
  peers = "127.0.0.1:19900"

