##############################################################################
# ─── Hybrid UDP/TCP ── scalar-flood at 100 Hz ───────────────────────────────
#
# QoS expansion: with `qos` omitted, the runner spawns one full lifecycle per
# QoS level (1..=4). Per-runner / per-qos TCP ports are derived by the variant
# from --tcp-base-port + --runner index in --peers + --qos (stride 1 per
# runner, 10 per qos level). UDP multicast uses --multicast-group directly
# with no stride (sequential per-spawn execution + silent_secs drain +
# inter_qos_grace_ms provide cross-spawn isolation).

[[variant]]
name = "hybrid-1000x100hz"
binary = "target/release/variant-hybrid.exe"

  [variant.common]
  tick_rate_hz = 100
  stabilize_secs = 3
  operate_secs = 30
  silent_secs = 3
  workload = "scalar-flood"
  values_per_tick = 1000
  log_dir = "./logs"

  [variant.specific]
  multicast_group = "239.0.0.1:19502"
  tcp_base_port = 19900

