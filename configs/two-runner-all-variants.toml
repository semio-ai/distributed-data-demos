# Comprehensive benchmark: every variant family, every (vpt, hz) sweep, every
# QoS level. Two runners on a LAN. Total spawn count = 48 [[variant]] entries
# expanded across QoS levels = 176 spawns (custom-udp 32 + hybrid 32 +
# quic 32 + zenoh 32 + websocket 16 + webrtc 32; websocket only contributes
# 8x2 because it supports only reliable QoS [3, 4]). Each runs the full
# stabilize/operate/silent cycle independently. Total runtime: ~10-15 minutes.
#
# Run from the repo root with two terminals:
#   target/release/runner --name alice --config configs/two-runner-all-variants.toml
#   target/release/runner --name bob   --config configs/two-runner-all-variants.toml
#
# Structure: each variant binary has a [[variant_template]] capturing the
# shared common + specific defaults (binary, multicast/port settings,
# workload, stabilize/operate/silent durations, log_dir). Each [[variant]]
# entry then only declares its differing fields (tick_rate_hz, values_per_tick,
# and -- for max-throughput entries -- the workload override). qos is
# omitted from every entry, so the runner expands each entry into 4 spawn
# jobs (qos 1..=4) per the contract.
#
# Per-runner / per-qos port disambiguation is handled by the variants
# themselves (see metak-shared/api-contracts/toml-config-schema.md "Port
# stride and QoS expansion"). With 2 runners and qos_stride = 10, each
# variant's `base_port` reserves ports `base_port .. base_port + 30`.

run = "all-variants-01"
runners = ["alice", "bob"]
default_timeout_secs = 120


# ─── Custom UDP ──────────────────────────────────────────────────────────────

[[variant_template]]
name = "custom-udp-base"
binary = "target/release/variant-custom-udp.exe"
  [variant_template.common]
  stabilize_secs = 3
  operate_secs = 30
  silent_secs = 3
  workload = "scalar-flood"
  log_dir = "./logs"
  [variant_template.specific]
  multicast_group = "239.0.0.1:19501"
  buffer_size = 65536
  tcp_base_port = 19800

[[variant]]
template = "custom-udp-base"
name = "custom-udp-1000x100hz"
  [variant.common]
  tick_rate_hz = 100
  values_per_tick = 1000

[[variant]]
template = "custom-udp-base"
name = "custom-udp-1000x10hz"
  [variant.common]
  tick_rate_hz = 10
  values_per_tick = 1000

[[variant]]
template = "custom-udp-base"
name = "custom-udp-100x1000hz"
  [variant.common]
  tick_rate_hz = 1000
  values_per_tick = 100

[[variant]]
template = "custom-udp-base"
name = "custom-udp-100x100hz"
  [variant.common]
  tick_rate_hz = 100
  values_per_tick = 100

[[variant]]
template = "custom-udp-base"
name = "custom-udp-100x10hz"
  [variant.common]
  tick_rate_hz = 10
  values_per_tick = 100

[[variant]]
template = "custom-udp-base"
name = "custom-udp-10x100hz"
  [variant.common]
  tick_rate_hz = 100
  values_per_tick = 10

[[variant]]
template = "custom-udp-base"
name = "custom-udp-10x1000hz"
  [variant.common]
  tick_rate_hz = 1000
  values_per_tick = 10

[[variant]]
template = "custom-udp-base"
name = "custom-udp-max"
  [variant.common]
  tick_rate_hz = 100
  values_per_tick = 1000
  workload = "max-throughput"


