# Comprehensive benchmark: every variant family, every (vpt, hz) sweep, every
# QoS level, both threading modes where supported (E14). Two runners on a LAN.
# Total spawn count = 48 [[variant]] entries expanded across QoS levels x
# threading_modes = 256 spawns:
#   - custom-udp / hybrid: 8 entries x 4 qos x 2 modes  = 64 each
#   - quic / zenoh / webrtc: 8 x 4 x 1 (Multi-only)     = 32 each
#   - websocket: 8 x 2 (qos [3, 4]) x 2 modes           = 32
# Each runs the full stabilize/operate/silent cycle independently.
# Total runtime: ~15-25 minutes (was ~10-15 pre-E14).
#
# Run from the repo root with two terminals:
#   target/release/runner --name alice --config configs/two-runner-all-variants.toml
#   target/release/runner --name bob   --config configs/two-runner-all-variants.toml
#
# Structure: each variant binary has a [[variant_template]] capturing the
# shared common + specific defaults (binary, multicast/port settings, workload,
# stabilize/operate/silent durations, log_dir, threading_modes). Each
# [[variant]] entry then declares its differing fields (tick_rate_hz,
# values_per_tick, and -- for max-throughput entries -- the workload override).
# Async-only families (quic, zenoh, webrtc) additionally declare
# supported_modes = ["multi"] on each [[variant]] so the runner's T14.8
# capability gating skips the Single expansion. qos is omitted from every
# entry, so the runner expands each entry into 4 spawn jobs (qos 1..=4) per the
# contract -- except websocket which sets qos = [3, 4] in its template since it
# only supports reliable QoS.
#
# threading_modes = ["single", "multi"] on every template runs each spawn in
# both threading regimes (E14). supported_modes on each [[variant]] tells the
# runner which modes the variant binary actually supports; unsupported
# expansions are silently skipped with a stderr notice (no failed spawns from
# capability mismatches). QUIC, Zenoh, and WebRTC declare supported_modes =
# ["multi"] per [[variant]] because they fundamentally rely on async runtimes;
# their Single spawns are skipped. TCP-family variants (custom-udp, hybrid,
# websocket) omit supported_modes and inherit the runner's permissive default
# (every requested mode is supported). Note: supported_modes is only honoured
# at the [[variant]] level (not at [[variant_template]]), which is why it is
# declared explicitly on each async-only entry.
# See metak-shared/api-contracts/toml-config-schema.md "E14 additions".
#
# Per-runner / per-qos port disambiguation is handled by the variants
# themselves (see metak-shared/api-contracts/toml-config-schema.md "Port
# stride and QoS expansion"). With 2 runners and qos_stride = 10, each
# variant's `base_port` reserves ports `base_port .. base_port + 30`.

run = "all-variants-01"
runners = ["alice", "bob"]
default_timeout_secs = 120


# ─── Custom UDP ──────────────────────────────────────────────────────────────

[[variant_template]]
name = "custom-udp-base"
binary = "target/release/variant-custom-udp.exe"
  [variant_template.common]
  stabilize_secs = 3
  operate_secs = 30
  silent_secs = 3
  workload = "scalar-flood"
  log_dir = "./logs"
  threading_modes = ["single", "multi"]
  [variant_template.specific]
  multicast_group = "239.0.0.1:19501"
  buffer_size = 65536
  tcp_base_port = 19800

[[variant]]
template = "custom-udp-base"
name = "custom-udp-1000x100hz"
  [variant.common]
  tick_rate_hz = 100
  values_per_tick = 1000

[[variant]]
template = "custom-udp-base"
name = "custom-udp-1000x10hz"
  [variant.common]
  tick_rate_hz = 10
  values_per_tick = 1000

[[variant]]
template = "custom-udp-base"
name = "custom-udp-100x1000hz"
  [variant.common]
  tick_rate_hz = 1000
  values_per_tick = 100

[[variant]]
template = "custom-udp-base"
name = "custom-udp-100x100hz"
  [variant.common]
  tick_rate_hz = 100
  values_per_tick = 100

[[variant]]
template = "custom-udp-base"
name = "custom-udp-100x10hz"
  [variant.common]
  tick_rate_hz = 10
  values_per_tick = 100

[[variant]]
template = "custom-udp-base"
name = "custom-udp-10x100hz"
  [variant.common]
  tick_rate_hz = 100
  values_per_tick = 10

[[variant]]
template = "custom-udp-base"
name = "custom-udp-10x1000hz"
  [variant.common]
  tick_rate_hz = 1000
  values_per_tick = 10

[[variant]]
template = "custom-udp-base"
name = "custom-udp-max"
  [variant.common]
  tick_rate_hz = 100
  values_per_tick = 1000
  workload = "max-throughput"


