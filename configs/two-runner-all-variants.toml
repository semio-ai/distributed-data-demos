# Comprehensive benchmark: every variant family, every (vpt, hz) sweep, every
# QoS level, both threading modes where supported (E14), and -- as of this
# revision -- every (vpt, hz) pair exercised under all three E19 workload
# profiles (scalar-flood, block-flood, mixed-types). Two runners on a LAN.
# Total spawn count = 132 [[variant]] entries expanded across QoS levels x
# threading_modes = 704 spawns:
#   - custom-udp / hybrid: 22 entries x 4 qos x 2 modes  = 176 each
#   - quic / zenoh / webrtc: 22 x 4 x 1 (Multi-only)     = 88 each
#   - websocket: 22 x 2 (qos [3, 4]) x 2 modes           = 88
# Each runs the full stabilize/operate/silent cycle independently.
# Estimated runtime: ~45-75 minutes (roughly 3x the pre-workload-triplication
# ~15-25 min figure). This is an estimate, not a measurement -- mixed-types
# and block-flood have different CPU profiles than scalar-flood so actual
# wall-clock will depend on per-spawn overhead under those workloads.
#
# Run from the repo root with two terminals:
#   target/release/runner --name alice --config configs/two-runner-all-variants.toml
#   target/release/runner --name bob   --config configs/two-runner-all-variants.toml
#
# Structure: each variant binary has a [[variant_template]] capturing the
# shared common + specific defaults (binary, multicast/port settings, default
# workload = "scalar-flood", stabilize/operate/silent durations, log_dir,
# threading_modes). Each [[variant]] entry then declares its differing fields
# (tick_rate_hz, values_per_tick, plus workload + workload-shape params for
# block-flood / mixed-types entries, and -- for max-throughput entries -- the
# workload override).
#
# Workload coverage per (vpt, hz) pair:
#   - <name>-scalar : workload = "scalar-flood" (inherited from template).
#   - <name>-block  : workload = "block-flood", blob_size = vpt / 10
#                     (1/10/100 for vpt 10/100/1000).
#   - <name>-mixed  : workload = "mixed-types", with scalars/arrays/dict
#                     parameters scaled to vpt (see toml-config-schema.md
#                     "E19 additions" for the validation rules). The
#                     workload_seed = 12345 across every mixed entry so
#                     re-runs are deterministic.
# Plus one <name>-max entry per family (workload = "max-throughput",
# 1000 vpt x 100 Hz) that remains as the throughput stress case.
#
# Async-only families (quic, zenoh, webrtc) additionally declare
# supported_modes = ["multi"] on each [[variant]] so the runner's T14.8
# capability gating skips the Single expansion. qos is omitted from every
# entry, so the runner expands each entry into 4 spawn jobs (qos 1..=4) per the
# contract -- except websocket which sets qos = [3, 4] in its template since it
# only supports reliable QoS.
#
# threading_modes = ["single", "multi"] on every template runs each spawn in
# both threading regimes (E14). supported_modes on each [[variant]] tells the
# runner which modes the variant binary actually supports; unsupported
# expansions are silently skipped with a stderr notice (no failed spawns from
# capability mismatches). QUIC, Zenoh, and WebRTC declare supported_modes =
# ["multi"] per [[variant]] because they fundamentally rely on async runtimes;
# their Single spawns are skipped. TCP-family variants (custom-udp, hybrid,
# websocket) omit supported_modes and inherit the runner's permissive default
# (every requested mode is supported). Note: supported_modes is only honoured
# at the [[variant]] level (not at [[variant_template]]), which is why it is
# declared explicitly on each async-only entry.
# See metak-shared/api-contracts/toml-config-schema.md "E14 additions".
#
# Per-runner / per-qos port disambiguation is handled by the variants
# themselves (see metak-shared/api-contracts/toml-config-schema.md "Port
# stride and QoS expansion"). With 2 runners and qos_stride = 10, each
# variant's `base_port` reserves ports `base_port .. base_port + 30`.

run = "all-variants-01"
runners = ["alice", "bob"]
default_timeout_secs = 120


# ─── Custom UDP ──────────────────────────────────────────────────────────────

[[variant_template]]
name = "custom-udp-base"
binary = "target/release/variant-custom-udp.exe"
  [variant_template.common]
  stabilize_secs = 3
  operate_secs = 30
  silent_secs = 3
  workload = "scalar-flood"
  log_dir = "./logs"
  threading_modes = ["single", "multi"]
  [variant_template.specific]
  multicast_group = "239.0.0.1:19501"
  buffer_size = 65536
  tcp_base_port = 19800
  qos = [3]

# --- 1000 vpt x 100 hz ---
[[variant]]
template = "custom-udp-base"
name = "custom-udp-1000x100hz-scalar"
  [variant.common]
  tick_rate_hz = 100
  values_per_tick = 1000

[[variant]]
template = "custom-udp-base"
name = "custom-udp-1000x100hz-block"
  [variant.common]
  tick_rate_hz = 100
  values_per_tick = 1000
  workload = "block-flood"
  blob_size = 100

[[variant]]
template = "custom-udp-base"
name = "custom-udp-1000x100hz-mixed"
  [variant.common]
  tick_rate_hz = 100
  values_per_tick = 1000
  workload = "mixed-types"
  mixed_scalars_min = 5
  mixed_scalars_max = 20
  mixed_arrays_min = 200
  mixed_arrays_max = 600
  mixed_dict_split_max = 4
  workload_seed = 12345

