# Comprehensive benchmark: all variants, all workload modes.
#
# 16 variants executed sequentially. Each runs for 30s operate
# with 3s stabilize and 3s silent drain. Total runtime: ~10 minutes.
#
# Run from the repo root with two terminals:
#   runner/target/release/runner --name alice --config configs/two-runner-all-variants.toml
#   runner/target/release/runner --name bob   --config configs/two-runner-all-variants.toml

run = "all-variants-01"
runners = ["alice", "bob"]
default_timeout_secs = 120

# ─── Custom UDP ── 1000 vps at 100 Hz ────────────────────────────────────

[[variant]]
name = "custom-udp-1000x100hz"
binary = "variants/custom-udp/target/release/variant-custom-udp.exe"

  [variant.common]
  tick_rate_hz = 100
  stabilize_secs = 3
  operate_secs = 30
  silent_secs = 3
  workload = "scalar-flood"
  values_per_tick = 1000
  qos = 2
  log_dir = "./logs"

  [variant.specific]
  multicast_group = "239.0.0.1:19500"
  buffer_size = 65536

