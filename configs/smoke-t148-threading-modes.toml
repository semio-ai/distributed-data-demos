# T14.8 smoke: variant-dummy running in both threading modes on a
# two-runner localhost config. The dummy variant supports Single +
# Multi modes (declared by T14.1 in variant-base/src/dummy.rs).
#
# Expected output: each runner produces 2 JSONL logs (-single, -multi)
# whose `connected` events record the matching threading_mode and the
# injected recv_buffer_kb (default 4096).

run = "smoke-t148"
runners = ["alice", "bob"]
default_timeout_secs = 30

[[variant]]
name = "dummy-tmod"
binary = "target/release/variant-dummy.exe"
supported_modes = ["single", "multi"]

  [variant.common]
  tick_rate_hz = 20
  stabilize_secs = 1
  operate_secs = 2
  silent_secs = 1
  workload = "scalar-flood"
  values_per_tick = 5
  qos = 1
  threading_modes = ["single", "multi"]
  log_dir = "./logs"

  [variant.specific]
