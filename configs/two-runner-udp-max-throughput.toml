run = "udp-max-throughput"
runners = ["alice", "bob"]
default_timeout_secs = 120

[[variant]]
name = "custom-udp"
binary = "variants/custom-udp/target/release/variant-custom-udp.exe"

  [variant.common]
  tick_rate_hz = 100
  stabilize_secs = 3
  operate_secs = 30
  silent_secs = 3
  workload = "max-throughput"
  values_per_tick = 1000
  qos = 2
  log_dir = "./logs"

  [variant.specific]
  multicast_group = "239.0.0.1:19500"
  buffer_size = 65536
