run = "quic-10x100hz"
runners = ["alice", "bob"]
default_timeout_secs = 60

[[variant]]
name = "quic-10x100hz"
binary = "target/release/variant-quic.exe"

  [variant.common]
  tick_rate_hz = 100
  stabilize_secs = 2
  operate_secs = 10
  silent_secs = 2
  workload = "scalar-flood"
  values_per_tick = 10
  qos = 2
  log_dir = "./logs"

  [variant.specific]
  bind_addr = "0.0.0.0:19930,0.0.0.0:19931"
  peers = "127.0.0.1:19930,127.0.0.1:19931"
