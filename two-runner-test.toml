run = "local-test-01"
runners = ["alice", "bob"]
default_timeout_secs = 30

[[variant]]
name = "custom-udp"
binary = "variants/custom-udp/target/release/variant-custom-udp.exe"

  [variant.common]
  tick_rate_hz = 10
  stabilize_secs = 1
  operate_secs = 5
  silent_secs = 1
  workload = "scalar-flood"
  values_per_tick = 5
  qos = 1
  log_dir = "./two-runner-logs"

  [variant.specific]
  multicast_group = "239.0.0.1:19500"
  buffer_size = 65536
